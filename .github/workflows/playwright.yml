name: Playwright Tests

on: [push, pull_request]  # Triggers on pushes and PRs

jobs:
  test:
    runs-on: ubuntu-latest  # Use Ubuntu runner (recommended for Playwright)

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browsers 🔥
        run: playwright install  # Installs ALL browsers (Chromium, Firefox, WebKit)

      - name: Run Tests
        run: python -m pytest tests/ -v
        env:
          AMZN_EMAIL: ${{ secrets.AMZN_EMAIL }}      # From GitHub Secrets
          AMZN_PASSWORD: ${{ secrets.AMZN_PASSWORD }}  # From GitHub Secrets